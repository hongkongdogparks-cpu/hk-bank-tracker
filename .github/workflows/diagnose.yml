name: Diagnose Bank Pages

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable

    steps:
      - name: Install Google Chrome stable
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome-stable --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Write and run diagnose script
        run: |
          mkdir runner_env && cd runner_env
          npm init -y
          npm pkg set type="module"
          npm install puppeteer-core --no-audit --no-fund --loglevel=error

          cat > diagnose.js << 'SCRIPT_EOF'
          import puppeteer from 'puppeteer-core';
          import { writeFileSync } from 'fs';

          const BANKS = [
            { name: 'HSBC',     url: 'https://www.hsbc.com.hk/zh-hk/premier-elite/offers/time-deposit-rate/' },
            { name: 'HangSeng', url: 'https://www.hangseng.com/zh-hk/personal/banking/time-deposit-offers/' },
            { name: 'BOC',      url: 'https://www.bochk.com/zh/deposits/promotions/timedeposit.html' },
            { name: 'Citi',     url: 'https://www.citibank.com.hk/zh/banking/time-deposit.html' },
            { name: 'SC',       url: 'https://www.sc.com/hk/zh/save/time-deposits/' },
            { name: 'paob',     url: 'https://www.paob.com.hk/tc/deposit.html' },
            { name: 'ICBC',     url: 'https://www.icbcasia.com/hk/en/personal/latest-promotion/online-time-deposit.html' },
            { name: 'livi',     url: 'https://www.livibank.com/zh_HK/rates.html' },
            { name: 'welab',    url: 'https://www.welab.bank/zh/rates/' },
            { name: 'airstar',  url: 'https://www.airstarbank.com/zh-hk/deposit.html' },
            { name: 'fusion',   url: 'https://www.fusionbank.com/deposit.html?lang=tc' },
          ];

          async function diagnose(browser, bank) {
            const page = await browser.newPage();
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36');
            await page.setRequestInterception(true);
            page.on('request', req => {
              if (['image', 'font', 'media'].includes(req.resourceType())) req.abort();
              else req.continue();
            });

            console.log('Diagnosing: ' + bank.name);
            try {
              await page.goto(bank.url, { waitUntil: 'networkidle2', timeout: 60000 });
              await new Promise(r => setTimeout(r, 6000));

              await page.evaluate(() => {
                const tabs = Array.from(document.querySelectorAll('button, a, li, [role="tab"]'));
                const hkdTab = tabs.find(el => /港元|HKD/i.test(el.innerText || ''));
                if (hkdTab) hkdTab.click();
              }).catch(() => {});
              await new Promise(r => setTimeout(r, 2000));

              const diag = await page.evaluate(() => {
                const out = [];
                out.push('=== PAGE TITLE ===');
                out.push(document.title);
                out.push('URL: ' + location.href);

                out.push('\n=== TABLES ===');
                const tables = document.querySelectorAll('table');
                out.push('Total: ' + tables.length);
                tables.forEach((table, i) => {
                  out.push('\n--- Table #' + (i+1) + ' class="' + (table.className||'').substring(0,60) + '" ---');
                  Array.from(table.querySelectorAll('tr')).slice(0, 12).forEach((row, ri) => {
                    const cells = Array.from(row.querySelectorAll('th, td'))
                      .map(c => c.innerText.trim().replace(/\s+/g, ' ').substring(0, 50));
                    out.push('  Row ' + ri + ': [' + cells.join(' | ') + ']');
                  });
                });

                out.push('\n=== ELEMENTS WITH % ===');
                const rateEls = Array.from(document.querySelectorAll('*')).filter(el => {
                  if (el.children.length > 0) return false;
                  const txt = (el.innerText || '').trim();
                  return /\d+\.?\d*\s*%/.test(txt) && txt.length < 25;
                });
                out.push('Found: ' + rateEls.length);
                rateEls.slice(0, 40).forEach(el => {
                  out.push('  <' + el.tagName + ' class="' + (el.className||'').toString().substring(0,40) + '" parent=' + (el.parentElement ? el.parentElement.tagName : '') + '>: "' + el.innerText.trim() + '"');
                });

                out.push('\n=== TENOR KEYWORDS ===');
                const tenorEls = Array.from(document.querySelectorAll('*')).filter(el => {
                  if (el.children.length > 0) return false;
                  const txt = (el.innerText || '').trim();
                  return /個月|month|1年/i.test(txt) && txt.length < 30;
                });
                out.push('Found: ' + tenorEls.length);
                tenorEls.slice(0, 20).forEach(el => {
                  out.push('  <' + el.tagName + ' class="' + (el.className||'').toString().substring(0,40) + '" parent=' + (el.parentElement ? el.parentElement.tagName : '') + '>: "' + el.innerText.trim() + '"');
                });

                out.push('\n=== IFRAMES ===');
                document.querySelectorAll('iframe').forEach((f, i) => out.push('  #' + i + ': ' + f.src));

                out.push('\n=== BODY TEXT (first 5000 chars) ===');
                out.push(document.body.innerText.substring(0, 5000));

                return out.join('\n');
              });

              writeFileSync('/tmp/diag_' + bank.name + '.txt', diag);
              console.log('  Saved /tmp/diag_' + bank.name + '.txt');
            } catch (err) {
              writeFileSync('/tmp/diag_' + bank.name + '.txt', 'ERROR: ' + err.message + '\n' + err.stack);
              console.error('  FAILED: ' + err.message);
            } finally {
              await page.close();
            }
          }

          const browser = await puppeteer.launch({
            executablePath: process.env.PUPPETEER_EXECUTABLE_PATH || '/usr/bin/google-chrome-stable',
            headless: 'new',
            args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-gpu', '--window-size=1280,900'],
          });

          for (const bank of BANKS) await diagnose(browser, bank);
          await browser.close();
          console.log('Done.');
          SCRIPT_EOF

          node diagnose.js

      - name: Upload diagnostic reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bank-diagnostics-${{ github.run_id }}
          path: /tmp/diag_*.txt
          if-no-files-found: warn
          retention-days: 7