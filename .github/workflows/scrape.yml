name: Daily Rates Update

on:
  schedule:
    - cron: '0 0 * * *' # 香港時間每天早上 8 點執行
  workflow_dispatch: # 💡 關鍵：這行必須存在，才會顯示「Run workflow」按鈕

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # 強制使用 Node 24 以消除棄用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Scraper Dependencies
        # 💡 極速安裝策略，避免 15 分鐘超時
        run: |
          npm install puppeteer-core firebase-admin --no-save --no-package-lock --no-audit --no-fund --prefer-offline
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Run Scraper
        run: node scraper.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome