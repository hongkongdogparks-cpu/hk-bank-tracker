name: Daily Rates Update

on:
  schedule:
    - cron: '0 0 * * *' # 香港時間每天早上 8 點執行
  workflow_dispatch: # 允許在 GitHub 頁面手動點擊按鈕執行

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: node scraper.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}