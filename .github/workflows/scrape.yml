name: Daily Rates Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 💡 增加時間上限到 30 分鐘，避免因為網路較慢或安裝較久而被強制中斷
    timeout-minutes: 30 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 💡 升級到 Node.js 24，解決日誌中的 Deprecation 警告
          node-version: '24' 
          cache: 'npm'

      - name: Install Scraper Dependencies
        # 只安裝必要組件，並加入 --no-audit 縮短檢查時間
        run: npm install puppeteer firebase-admin --no-audit

      - name: Run Scraper
        run: node scraper.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}