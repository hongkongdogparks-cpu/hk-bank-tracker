name: Daily Rates Update

on:
  schedule:
    - cron: '0 0 * * *' # 香港時間每天早上 08:00 (00:00 UTC) 執行
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # 💡 環境隔離後，目標應在 3 分鐘內完成
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Scraper with Isolation
        # 💡 核心修正：加入 npm pkg set type="module" 以支援 scraper.js 的 import 語法
        run: |
          mkdir runner_env
          cd runner_env
          npm init -y
          npm pkg set type="module"
          npm install puppeteer-core firebase-admin --no-audit --no-fund --prefer-offline
          cp ../scraper.js .
          node scraper.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'