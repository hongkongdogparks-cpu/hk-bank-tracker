name: Daily Rates Update

on:
  schedule:
    - cron: '0 0 * * *' # 香港時間每天早上 08:00 (00:00 UTC) 執行
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # 強制使用 Node 24 以消除舊版警告並確保效能
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Scraper Dependencies
        # 💡 極速安裝策略：僅安裝爬蟲所需核心套件，避免解析整份 package.json
        run: |
          npm install puppeteer-core firebase-admin --no-save --no-package-lock --no-audit --no-fund --prefer-offline
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Run Scraper
        # 💡 執行 Canvas 中的抓取腳本
        run: node scraper.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome