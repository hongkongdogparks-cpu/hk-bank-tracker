name: Daily Rates Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 自動開啟快取功能，大幅提升下次安裝速度

      - name: Install Dependencies
        # 使用 npm ci 比 npm install 更快更穩定，適合自動化環境
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install puppeteer firebase-admin
          fi

      - name: Run Scraper
        run: node scraper.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}